# Development docker-compose with hot reload
services:
  postgres:
    image: postgres:16-alpine
    container_name: kprueck-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: kprueck
      POSTGRES_PASSWORD: kprueck
      POSTGRES_DB: kprueck
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kprueck"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - kprueck-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kprueck-backend-dev
    restart: unless-stopped
    command: ./start-dev.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kprueck:kprueck@postgres:5432/kprueck
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      AUTH_BYPASS_AUTH_DEV: "true"
      RELOAD: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - kprueck-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: kprueck-frontend-dev
    restart: unless-stopped
    command: pnpm dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Server-side API URL (for Next.js server)
      INTERNAL_API_URL: http://backend:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - kprueck-network

  tileserver:
    build:
      context: .
      dockerfile: ./tileserver/Dockerfile
    container_name: kprueck-tileserver-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - tileserver-dev-data:/data
    environment:
      - TILESERVER_PORT=8080
    networks:
      - kprueck-network
    # Automatically creates minimal tiles on first run
    # For full-resolution tiles: make tiles-download
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # Thermal printer agent (optional - for local command post installations)
  # Start with: docker compose -f docker-compose.dev.yml --profile printing up -d
  # Or: just print-agent
  print-agent:
    build:
      context: ./print-agent
      dockerfile: Dockerfile
    container_name: kprueck-print-agent-dev
    restart: unless-stopped
    # Use host network to access printer on local LAN
    network_mode: "host"
    environment:
      # Backend URL (use localhost since we're on host network)
      BACKEND_URL: http://localhost:8000
      # Printer config is fetched from backend settings
      POLL_INTERVAL: ${POLL_INTERVAL:-2}
      DRY_RUN: ${DRY_RUN:-false}
      LOG_LEVEL: INFO
    profiles:
      - printing
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  kprueck-network:
    driver: bridge

volumes:
  postgres_dev_data:
  tileserver-dev-data:
