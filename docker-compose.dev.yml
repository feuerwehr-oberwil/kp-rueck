# Development docker-compose with hot reload
services:
  postgres:
    image: postgres:16-alpine
    container_name: kprueck-db-dev
    environment:
      POSTGRES_USER: kprueck
      POSTGRES_PASSWORD: kprueck
      POSTGRES_DB: kprueck
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kprueck"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kprueck-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kprueck-backend-dev
    command: ./start-dev.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kprueck:kprueck@postgres:5432/kprueck
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      AUTH_BYPASS_AUTH_DEV: "true"
      RELOAD: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kprueck-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: kprueck-frontend-dev
    command: pnpm dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - kprueck-network

  tileserver:
    build:
      context: .
      dockerfile: ./tileserver/Dockerfile
    container_name: kprueck-tileserver-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - tileserver-dev-data:/data
    environment:
      - TILESERVER_PORT=8080
    networks:
      - kprueck-network
    # Automatically creates minimal tiles on first run
    # For full-resolution tiles: make tiles-download
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  kprueck-network:
    driver: bridge

volumes:
  postgres_dev_data:
  tileserver-dev-data:
